# Deploy this file on the ACQUIRER server.
# Connects to the PostgreSQL and Issuer TCP service running on the issuer server.
#
# Usage:
#   cp .env.acquirer.example .env
#   docker compose -f docker-compose.acquirer.yml up -d

services:
  acquirer:
    image: ${ACQUIRER_IMAGE:-ghcr.io/fatihbulut/iso-parser-service-acquirer:latest}
    restart: unless-stopped
    ports:
      - "${ACQUIRER_PORT:-8081}:8081"
    environment:
      DATABASE_URL: postgres://paymentlab:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:5432/paymentlab?sslmode=disable
      ISSUER_ADDR: ${ISSUER_ADDR}
      ACQUIRER_PORT: 8081
      ACQUIRER_TCP_POOL: ${ACQUIRER_TCP_POOL:-20}
      MAX_CONCURRENT: ${MAX_CONCURRENT:-80}
      MAX_QUEUE: ${MAX_QUEUE:-10000}
      QUEUE_TIMEOUT_SEC: ${QUEUE_TIMEOUT_SEC:-60}
      DB_POOL_MAX: ${DB_POOL_MAX:-10}
      DB_POOL_MIN: ${DB_POOL_MIN:-2}
      DB_AUDIT_POOL_MAX: ${DB_AUDIT_POOL_MAX:-10}
      DB_AUDIT_POOL_MIN: ${DB_AUDIT_POOL_MIN:-2}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      OTEL_EXPORTER_OTLP_HEADERS: ${OTEL_EXPORTER_OTLP_HEADERS:-}
