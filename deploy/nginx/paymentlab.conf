upstream go_backend {
    server 127.0.0.1:8081;
    keepalive 128;
}

server {
    listen 80 backlog=4096 reuseport;
    listen [::]:80 backlog=4096;
    server_name paymentlab.dev www.paymentlab.dev;

    location / {
        proxy_pass http://go_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        proxy_connect_timeout 2s;
        proxy_send_timeout 5s;
        proxy_read_timeout 5s;
        proxy_buffering off;
    }
}

server {
    listen 443 ssl http2 backlog=4096 reuseport;
    listen [::]:443 ssl http2 backlog=4096;
    server_name paymentlab.dev www.paymentlab.dev;

    ssl_certificate     /etc/nginx/ssl/paymentlab_combined.crt;
    ssl_certificate_key /etc/nginx/ssl/paymentlab_rsa.key;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_ciphers HIGH:!aNULL:!MD5;

    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    location / {
        proxy_pass http://go_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 2s;
        proxy_send_timeout 5s;
        proxy_read_timeout 5s;
        proxy_buffering off;
    }
}
