<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ISO 8583 Transaction Simulator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        slate: {
                            850: '#1a202e',
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-slate-900 text-gray-100 min-h-screen">
    <div class="container mx-auto px-4 py-8">
        <!-- Header -->
        <div class="mb-8">
            <h1 class="text-4xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-indigo-400 to-emerald-400">
                ISO 8583 Transaction Simulator
            </h1>
            <p class="text-gray-400 mt-2">Test payment transactions with real-time hex visualization</p>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
            <!-- Left Panel - Payment Form -->
            <div class="space-y-6">
                <!-- Payment Card -->
                <div class="bg-gradient-to-br from-indigo-600 to-indigo-800 rounded-2xl p-8 shadow-2xl">
                    <div class="flex justify-between items-start mb-8">
                        <div class="text-white">
                            <div class="text-sm opacity-75">Payment Card</div>
                            <div class="text-2xl font-bold mt-1">VISA</div>
                        </div>
                        <svg class="w-12 h-12 text-white opacity-75" fill="currentColor" viewBox="0 0 24 24">
                            <path d="M20 4H4c-1.11 0-1.99.89-1.99 2L2 18c0 1.11.89 2 2 2h16c1.11 0 2-.89 2-2V6c0-1.11-.89-2-2-2zm0 14H4v-6h16v6zm0-10H4V6h16v2z"/>
                        </svg>
                    </div>
                    <div class="space-y-4">
                        <div>
                            <div class="text-white text-2xl font-mono tracking-wider" id="cardDisplay">
                                •••• •••• •••• ••••
                            </div>
                        </div>
                        <div class="grid grid-cols-2 gap-4 text-white">
                            <div>
                                <div class="text-xs opacity-75">CARD HOLDER</div>
                                <div class="font-semibold">TEST USER</div>
                            </div>
                            <div>
                                <div class="text-xs opacity-75">EXPIRES</div>
                                <div class="font-semibold">12/28</div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Transaction Form -->
                <div class="bg-slate-800 rounded-xl p-6 shadow-xl border border-slate-700">
                    <h2 class="text-xl font-semibold mb-6 text-indigo-400">Transaction Details</h2>
                    <form id="transactionForm" class="space-y-4">
                        <!-- PAN -->
                        <div>
                            <label class="block text-sm font-medium text-gray-300 mb-2">
                                Card Number (PAN)
                            </label>
                            <input 
                                type="text" 
                                id="pan" 
                                maxlength="19"
                                placeholder="4506 1234 5678 9012"
                                class="w-full px-4 py-3 bg-slate-700 border border-slate-600 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent text-white placeholder-gray-500 font-mono"
                                required
                            >
                        </div>

                        <!-- Amount -->
                        <div>
                            <label class="block text-sm font-medium text-gray-300 mb-2">
                                Amount
                            </label>
                            <div class="relative">
                                <input 
                                    type="number" 
                                    id="amount" 
                                    step="0.01"
                                    placeholder="100.00"
                                    class="w-full px-4 py-3 bg-slate-700 border border-slate-600 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent text-white placeholder-gray-500"
                                    required
                                >
                                <div class="absolute inset-y-0 right-0 flex items-center pr-3 pointer-events-none">
                                    <span class="text-gray-400" id="currencySymbol">TRY</span>
                                </div>
                            </div>
                        </div>

                        <!-- Currency -->
                        <div>
                            <label class="block text-sm font-medium text-gray-300 mb-2">
                                Currency
                            </label>
                            <select 
                                id="currency"
                                class="w-full px-4 py-3 bg-slate-700 border border-slate-600 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent text-white"
                            >
                                <option value="949">TRY - Turkish Lira</option>
                                <option value="840">USD - US Dollar</option>
                                <option value="978">EUR - Euro</option>
                            </select>
                        </div>

                        <!-- Submit Button -->
                        <button 
                            type="submit"
                            class="w-full bg-gradient-to-r from-indigo-600 to-indigo-700 hover:from-indigo-700 hover:to-indigo-800 text-white font-semibold py-4 px-6 rounded-lg shadow-lg transform transition hover:scale-105 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2 focus:ring-offset-slate-800"
                        >
                            <span class="flex items-center justify-center">
                                <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 9V7a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2m2 4h10a2 2 0 002-2v-6a2 2 0 00-2-2H9a2 2 0 00-2 2v6a2 2 0 002 2zm7-5a2 2 0 11-4 0 2 2 0 014 0z"/>
                                </svg>
                                Process Payment
                            </span>
                        </button>
                    </form>
                </div>
            </div>

            <!-- Right Panel - Response Display -->
            <div class="space-y-6">
                <!-- Status Card -->
                <div id="statusCard" class="hidden bg-slate-800 rounded-xl p-6 shadow-xl border border-slate-700">
                    <div class="flex items-center justify-between mb-4">
                        <h3 class="text-lg font-semibold text-gray-300">Transaction Status</h3>
                        <div id="statusBadge"></div>
                    </div>
                    <div id="statusDetails" class="space-y-3 text-sm"></div>
                </div>

                <!-- Request Hex -->
                <div class="bg-slate-800 rounded-xl p-6 shadow-xl border border-slate-700">
                    <div class="flex items-center justify-between mb-4">
                        <h3 class="text-lg font-semibold text-indigo-400">Request (Hex)</h3>
                        <button onclick="copyToClipboard('requestHex')" class="text-gray-400 hover:text-indigo-400 transition">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/>
                            </svg>
                        </button>
                    </div>
                    <div class="bg-slate-900 rounded-lg p-4 font-mono text-xs text-emerald-400 break-all overflow-x-auto max-h-48 overflow-y-auto border border-slate-700">
                        <code id="requestHex" class="whitespace-pre-wrap">Waiting for transaction...</code>
                    </div>
                </div>

                <!-- Response Hex -->
                <div class="bg-slate-800 rounded-xl p-6 shadow-xl border border-slate-700">
                    <div class="flex items-center justify-between mb-4">
                        <h3 class="text-lg font-semibold text-emerald-400">Response (Hex)</h3>
                        <button onclick="copyToClipboard('responseHex')" class="text-gray-400 hover:text-emerald-400 transition">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/>
                            </svg>
                        </button>
                    </div>
                    <div class="bg-slate-900 rounded-lg p-4 font-mono text-xs text-emerald-400 break-all overflow-x-auto max-h-48 overflow-y-auto border border-slate-700">
                        <code id="responseHex" class="whitespace-pre-wrap">Waiting for response...</code>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Format card number display
        document.getElementById('pan').addEventListener('input', function(e) {
            let value = e.target.value.replace(/\s/g, '');
            let formattedValue = value.match(/.{1,4}/g)?.join(' ') || value;
            e.target.value = formattedValue;
            
            // Update card display
            const cardDisplay = document.getElementById('cardDisplay');
            if (value.length > 0) {
                const masked = value.substring(0, 4) + ' •••• •••• ' + value.substring(value.length - 4);
                cardDisplay.textContent = masked;
            } else {
                cardDisplay.textContent = '•••• •••• •••• ••••';
            }
        });

        // Update currency symbol
        document.getElementById('currency').addEventListener('change', function(e) {
            const currencyMap = {
                '949': 'TRY',
                '840': 'USD',
                '978': 'EUR'
            };
            document.getElementById('currencySymbol').textContent = currencyMap[e.target.value];
        });

        // Generate random STAN
        function generateSTAN() {
            return Math.floor(100000 + Math.random() * 900000).toString();
        }

        // Get current date/time in ISO 8583 format
        function getLocalDate() {
            const now = new Date();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');
            return month + day;
        }

        function getLocalTime() {
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            return hours + minutes + seconds;
        }

        // Response code mapping
        const responseCodeMap = {
            '00': 'Approved',
            '05': 'Do not honor',
            '14': 'Invalid card number',
            '51': 'Insufficient funds',
            '54': 'Expired card',
            '55': 'Incorrect PIN',
            '57': 'Transaction not permitted',
            '58': 'Transaction not permitted to terminal',
            '61': 'Exceeds withdrawal limit',
            '65': 'Exceeds withdrawal frequency',
            '91': 'Issuer or switch inoperative',
            '96': 'System malfunction'
        };

        // Handle form submission
        document.getElementById('transactionForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const pan = document.getElementById('pan').value.replace(/\s/g, '');
            const amount = document.getElementById('amount').value;
            const currency = document.getElementById('currency').value;

            // Convert amount to 12-digit format (pad with zeros)
            const amountCents = Math.round(parseFloat(amount) * 100);
            const amountTrn = String(amountCents).padStart(12, '0');

            const payload = {
                MTI: "0100",
                PAN: pan,
                ProcCode: "003000",
                AmountTrn: amountTrn,
                LocalTime: getLocalTime(),
                LocalDate: getLocalDate(),
                STAN: generateSTAN(),
                TerminalID: "TERM0001",
                MerchantID: "MERC00000000001"
            };

            try {
                const response = await fetch('/v1/transaction', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();

                // Display hex data
                document.getElementById('requestHex').textContent = data.request_hex || 'N/A';
                document.getElementById('responseHex').textContent = data.response_hex || 'N/A';

                // Display status
                const statusCard = document.getElementById('statusCard');
                statusCard.classList.remove('hidden');

                const respCode = data.response?.RespCode || 'Unknown';
                const isSuccess = respCode === '00';

                // Status badge
                const statusBadge = document.getElementById('statusBadge');
                if (isSuccess) {
                    statusBadge.innerHTML = '<span class="px-3 py-1 bg-emerald-500 text-white text-sm font-semibold rounded-full">SUCCESS</span>';
                } else {
                    statusBadge.innerHTML = '<span class="px-3 py-1 bg-red-500 text-white text-sm font-semibold rounded-full">DECLINED</span>';
                }

                // Status details
                const statusDetails = document.getElementById('statusDetails');
                const responseCodeDesc = responseCodeMap[respCode] || 'Unknown error';
                
                statusDetails.innerHTML = `
                    <div class="flex justify-between py-2 border-b border-slate-700">
                        <span class="text-gray-400">MTI:</span>
                        <span class="font-mono text-white">${data.response?.MTI || 'N/A'}</span>
                    </div>
                    <div class="flex justify-between py-2 border-b border-slate-700">
                        <span class="text-gray-400">Response Code:</span>
                        <span class="font-mono ${isSuccess ? 'text-emerald-400' : 'text-red-400'}">${respCode} - ${responseCodeDesc}</span>
                    </div>
                    <div class="flex justify-between py-2 border-b border-slate-700">
                        <span class="text-gray-400">STAN:</span>
                        <span class="font-mono text-white">${data.response?.STAN || 'N/A'}</span>
                    </div>
                    <div class="flex justify-between py-2 border-b border-slate-700">
                        <span class="text-gray-400">Amount:</span>
                        <span class="font-mono text-white">${amount} ${document.getElementById('currencySymbol').textContent}</span>
                    </div>
                    <div class="flex justify-between py-2">
                        <span class="text-gray-400">PAN:</span>
                        <span class="font-mono text-white">${pan.substring(0, 6)}******${pan.substring(pan.length - 4)}</span>
                    </div>
                `;

            } catch (error) {
                console.error('Error:', error);
                document.getElementById('requestHex').textContent = 'Error: ' + error.message;
                document.getElementById('responseHex').textContent = 'Failed to process transaction';
            }
        });

        // Copy to clipboard
        function copyToClipboard(elementId) {
            const text = document.getElementById(elementId).textContent;
            navigator.clipboard.writeText(text).then(() => {
                // Show feedback
                const button = event.currentTarget;
                const originalHTML = button.innerHTML;
                button.innerHTML = '<svg class="w-5 h-5 text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>';
                setTimeout(() => {
                    button.innerHTML = originalHTML;
                }, 1000);
            });
        }
    </script>
</body>
</html>
