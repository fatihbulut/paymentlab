name: Build & Deploy

on:
  push:
    branches: [staging]
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - '.gitignore'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  OWNER: ${{ github.repository_owner }}

jobs:

  # ─────────────────────────────────────────────────────
  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push issuer image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.issuer
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.OWNER }}/iso-parser-service-issuer:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push acquirer image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.acquirer
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.OWNER }}/iso-parser-service-acquirer:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────────────
  deploy-issuer:
    name: Deploy → Issuer Server
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Copy compose file to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host:     ${{ vars.ISSUER_IP }}
          username: ${{ vars.REMOTE_USER }}
          key:      ${{ vars.ISSUER_SSH_PRIVATE_KEY }}
          source:   docker-compose.issuer.yml
          target:   ~/

      - name: Deploy via Docker Compose
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ vars.ISSUER_IP }}
          username: ${{ vars.REMOTE_USER }}
          key:      ${{ vars.ISSUER_SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd ~
            docker compose -f docker-compose.issuer.yml pull
            docker compose -f docker-compose.issuer.yml up -d
            docker image prune -f

  # ─────────────────────────────────────────────────────
  deploy-acquirer:
    name: Deploy → Acquirer Server
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Copy compose file to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host:     ${{ vars.ACQUIRER_IP }}
          username: ${{ vars.REMOTE_USER }}
          key:      ${{ vars.ACQUIRER_SSH_PRIVATE_KEY }}
          source:   docker-compose.acquirer.yml
          target:   ~/

      - name: Deploy via Docker Compose
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ vars.ACQUIRER_IP }}
          username: ${{ vars.REMOTE_USER }}
          key:      ${{ vars.ACQUIRER_SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd ~
            docker compose -f docker-compose.acquirer.yml pull
            docker compose -f docker-compose.acquirer.yml up -d
            docker image prune -f
